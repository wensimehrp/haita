name: Build Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download and install Typhoon
        run: |
          curl -L -o typhoon.tar.xz \
            https://github.com/WenSimEHRP/tailwindcss-typst/releases/download/0.1.2/typhoon.tar.xz
          tar -xf typhoon.tar.xz
          mkdir -p ~/.local/share/typst/packages/local/typhoon/0.1.2
          mv dist/* ~/.local/share/typst/packages/local/typhoon/0.1.2/

      - uses: DeterminateSystems/nix-installer-action@v20
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build docs
        run: nix develop .#default --command typst c ./doc.typ --features bundle,html -f bundle ./dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/otter-docs

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v5
